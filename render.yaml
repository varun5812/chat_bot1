services:
  - type: web
    name: customer-support-rag-chatbot
    env: python
    plan: free
    buildCommand: mkdir -p /tmp/cargo /tmp/pip-cache && CARGO_HOME=/tmp/cargo PIP_CACHE_DIR=/tmp/pip-cache python -m pip install --upgrade pip setuptools wheel && CARGO_HOME=/tmp/cargo PIP_CACHE_DIR=/tmp/pip-cache python -m pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: PIP_CACHE_DIR
        value: /tmp/pip-cache
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-3.5-turbo
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHROMA_DB_DIR
        value: data/chroma
      - key: DOCUMENTS_DIR
        value: data/raw
      - key: RETRIEVAL_TOP_K
        value: "4"
      - key: AUTO_INGEST_ON_START
        value: "true"
      - key: FLASK_SECRET_KEY
        generateValue: true
